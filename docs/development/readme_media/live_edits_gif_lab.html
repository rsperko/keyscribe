<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KeyScribe Live Edits GIF Lab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07100e;
      --panel: #0b1714;
      --panel2: #10211c;
      --surface: rgba(255, 255, 255, 0.055);
      --surface2: rgba(255, 255, 255, 0.085);
      --line: rgba(255, 255, 255, 0.13);
      --line2: rgba(255, 255, 255, 0.2);
      --ink: #f1fbf7;
      --muted: #a7bbb2;
      --soft: #74887f;
      --teal: #3ce9c9;
      --teal2: #17b89c;
      --gold: #f7b955;
      --violet: #a78bfa;
      --sky: #56b6f0;
      --green: #54dc83;
      --red: #ff756d;
      --radius: 16px;
      --radius-sm: 11px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: var(--font);
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 6% 0%, rgba(60, 233, 201, 0.16), transparent 24rem),
        radial-gradient(circle at 92% 12%, rgba(247, 185, 85, 0.11), transparent 26rem),
        linear-gradient(180deg, #07100e, #081310 68%, #07100e);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.58;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(ellipse 82% 62% at 50% 0%, #000 28%, transparent 80%);
      pointer-events: none;
    }

    h1, p { margin: 0; }
    .frame {
      width: 820px;
      height: 620px;
      padding: 28px;
      position: relative;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(4, 12, 10, 0.58);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.55),
        0 28px 80px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.055);
    }

    .stage {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 12px;
      width: 100%;
      height: 100%;
    }

    .source {
      position: relative;
      min-height: 232px;
      padding: 20px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(11, 23, 20, 0.98), rgba(9, 20, 17, 0.78));
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .source::after {
      content: "";
      position: absolute;
      inset: auto -20% -38% 18%;
      height: 120px;
      background: radial-gradient(circle, rgba(60, 233, 201, 0.18), transparent 62%);
      opacity: 0;
      transition: opacity 0.34s var(--ease);
    }

    .source.is-listening::after,
    .source.is-routing::after { opacity: 1; }

    .source__top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .keycap {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      font-family: var(--mono);
      color: var(--ink);
      font-size: 12.5px;
      font-weight: 700;
      border: 1px solid var(--line2);
      border-bottom-width: 2px;
      border-radius: 8px;
      background: linear-gradient(180deg, #1a2a24, #101d18);
      transition: transform 0.14s var(--ease), box-shadow 0.14s var(--ease), border-color 0.14s;
    }

    .source.is-listening .keycap {
      transform: translateY(1px);
      border-color: rgba(60, 233, 201, 0.6);
      box-shadow: 0 0 0 3px rgba(60, 233, 201, 0.17);
    }

    .source__label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .source.is-listening .source__label { color: var(--teal); }
    .source.is-routing .source__label { color: var(--gold); }

    .hud {
      --level: 0;
      width: min(300px, 100%);
      height: 64px;
      margin: 12px auto 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 15px;
      overflow: hidden;
      position: relative;
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 15px;
      background: linear-gradient(180deg, rgba(64, 74, 70, 0.82), rgba(22, 32, 28, 0.86));
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(18px) saturate(130%);
    }

    .hud__icon {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      position: relative;
      display: grid;
      place-items: center;
    }

    .hud__halo,
    .hud__dot {
      position: absolute;
      border-radius: 999px;
      transition: opacity 0.16s, transform 0.08s;
    }

    .hud__halo {
      width: calc(17px + var(--level) * 15px);
      height: calc(17px + var(--level) * 15px);
      background: rgba(255, 69, 58, calc(0.13 + var(--level) * 0.34));
    }

    .hud__dot {
      width: calc(8px + var(--level) * 17px);
      height: calc(8px + var(--level) * 17px);
      background: #ff453a;
    }

    .hud__icon::after {
      content: "";
      position: absolute;
      inset: 6px;
      opacity: 0;
      border-radius: 999px;
    }

    .hud.is-busy .hud__halo,
    .hud.is-busy .hud__dot,
    .hud.is-done .hud__halo,
    .hud.is-done .hud__dot { opacity: 0; }

    .hud.is-busy .hud__icon::after {
      opacity: 1;
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-top-color: var(--teal);
      animation: spin 0.8s linear infinite;
    }

    .hud.is-done .hud__icon::after {
      content: "✓";
      inset: 3px;
      opacity: 1;
      display: grid;
      place-items: center;
      color: var(--teal);
      border: 1px solid rgba(60, 233, 201, 0.42);
      background: rgba(60, 233, 201, 0.11);
      font-size: 15px;
      font-weight: 900;
    }

    .hud__copy {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .hud__copy b {
      overflow: hidden;
      color: var(--ink);
      font-size: 13.5px;
      line-height: 1.15;
      font-weight: 800;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .hud__copy span {
      overflow: hidden;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.2;
      font-weight: 650;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .partial {
      min-height: 42px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.5;
      font-style: italic;
      position: relative;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.26s var(--ease);
    }

    .source.is-listening .partial,
    .source.is-routing .partial,
    .source.is-done .partial { opacity: 1; }

    .routechip {
      width: fit-content;
      height: 0;
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      color: var(--gold);
      border: 1px solid rgba(247, 185, 85, 0.28);
      border-radius: 999px;
      background: rgba(247, 185, 85, 0.11);
      font-size: 12px;
      font-weight: 800;
      position: relative;
      z-index: 2;
      transition: height 0.26s var(--ease), padding 0.26s var(--ease), opacity 0.26s;
      opacity: 0;
    }

    .routechip::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold);
      animation: pulse 1.1s ease-in-out infinite;
    }

    .source.is-routing .routechip,
    .source.is-done .routechip {
      height: 30px;
      padding: 0 12px;
      opacity: 1;
    }

    .mode-prompt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
      margin: 0 2px -2px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.01em;
    }

    .mode-prompt span:last-child {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
    }

    .fan {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .card {
      min-height: 276px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.035));
      opacity: 0.36;
      transform: translateY(9px) scale(0.985);
      transition: opacity 0.34s var(--ease), transform 0.34s var(--ease), border-color 0.34s, box-shadow 0.34s;
    }

    .card.is-on {
      opacity: 1;
      transform: none;
    }

    .card--newline.is-on {
      border-color: rgba(167, 139, 250, 0.44);
      box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.12), 0 14px 34px rgba(167, 139, 250, 0.11);
    }

    .card--clipboard.is-on {
      border-color: rgba(86, 182, 240, 0.44);
      box-shadow: 0 0 0 1px rgba(86, 182, 240, 0.12), 0 14px 34px rgba(86, 182, 240, 0.1);
    }

    .card--scratch.is-on {
      border-color: rgba(84, 220, 131, 0.42);
      box-shadow: 0 0 0 1px rgba(84, 220, 131, 0.11), 0 14px 34px rgba(84, 220, 131, 0.1);
    }

    .card__head {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .card__app {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #fff;
      font-size: 12.5px;
      font-weight: 850;
    }

    .glyph {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 22px;
      color: var(--c);
      border: 1px solid color-mix(in srgb, var(--c) 38%, transparent);
      border-radius: 7px;
      background: color-mix(in srgb, var(--c) 11%, transparent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 900;
    }

    .badge {
      width: fit-content;
      padding: 4px 8px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.045);
      font-size: 10.5px;
      font-weight: 800;
    }

    .card__body {
      min-height: 1em;
      color: var(--ink);
      font-size: 13.2px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .tok {
      opacity: 0;
      transition: opacity 0.16s ease;
    }

    .tok.in { opacity: 1; }

    @keyframes pulse { 50% { opacity: 0.35; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="frame">
    <section class="stage" aria-label="Animated mode routing demo">
      <div class="source" id="source">
        <div class="source__top">
          <span class="keycap" id="keycap">Fn hold</span>
          <span class="source__label" id="caption">Ready at the cursor</span>
        </div>
        <div class="hud" id="hud" style="--level: 0">
          <div class="hud__icon" aria-hidden="true">
            <span class="hud__halo"></span>
            <span class="hud__dot"></span>
          </div>
          <div class="hud__copy">
            <b id="hud-title">Plain Dictation</b>
            <span id="hud-detail">Next dictation</span>
          </div>
        </div>
        <p class="partial" id="partial"></p>
        <div class="routechip" id="routechip">local edits · no LLM</div>
      </div>

      <div class="mode-prompt">
        <span>Turn spoken commands into edits</span>
        <span>before the text lands</span>
      </div>

      <div class="fan">
        <article class="card card--newline" id="newline-card">
          <header class="card__head">
            <span class="card__app"><span class="glyph" style="--c: var(--violet)">↵</span>New line</span>
            <span class="badge">insert new line</span>
          </header>
          <div class="card__body" id="newline-out"></div>
        </article>
        <article class="card card--scratch" id="scratch-card">
          <header class="card__head">
            <span class="card__app"><span class="glyph" style="--c: var(--sky)">⌫</span>Scratch that</span>
            <span class="badge">replace the last segment</span>
          </header>
          <div class="card__body" id="scratch-out"></div>
        </article>
        <article class="card card--clipboard" id="clipboard-card">
          <header class="card__head">
            <span class="card__app"><span class="glyph" style="--c: var(--green)">⌘V</span>Clipboard</span>
            <span class="badge">insert clipboard contents</span>
          </header>
          <div class="card__body" id="clipboard-out"></div>
        </article>
      </div>
    </section>
  </main>

  <script>
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    const source = document.querySelector("#source");
    const keycap = document.querySelector("#keycap");
    const caption = document.querySelector("#caption");
    const hud = document.querySelector("#hud");
    const hudTitle = document.querySelector("#hud-title");
    const hudDetail = document.querySelector("#hud-detail");
    const partial = document.querySelector("#partial");
    const cards = [
      ["#newline-card", "#newline-out", ["Today's list", "apples"]],
      ["#scratch-card", "#scratch-out", ["Today's list", "oranges"]],
      ["#clipboard-card", "#clipboard-out", ["Today's list", "oranges", "bananas"]]
    ];
    const raw = "today's list insert new line apples scratch that oranges insert new line insert clipboard contents";
    let waveFrame = 0;

    function setHud(state, title, detail) {
      hud.classList.toggle("is-busy", state === "busy");
      hud.classList.toggle("is-done", state === "done");
      hudTitle.textContent = title;
      hudDetail.textContent = detail;
    }

    function reset() {
      cancelAnimationFrame(waveFrame);
      source.className = "source";
      keycap.textContent = "Fn hold";
      caption.textContent = "Ready at the cursor";
      partial.textContent = "";
      hud.style.setProperty("--level", "0");
      setHud("ready", "Plain Dictation", "Next dictation");
      for (const [cardSelector, outputSelector] of cards) {
        document.querySelector(cardSelector).classList.remove("is-on");
        document.querySelector(outputSelector).textContent = "";
      }
    }

    function startWave() {
      cancelAnimationFrame(waveFrame);
      const start = performance.now();
      const tick = (now) => {
        const t = (now - start) / 1000;
        const level = Math.max(0.08, Math.min(1, 0.48 + 0.34 * Math.sin(t * 3.4) + 0.18 * Math.sin(t * 9.1)));
        hud.style.setProperty("--level", level.toFixed(2));
        waveFrame = requestAnimationFrame(tick);
      };
      waveFrame = requestAnimationFrame(tick);
    }

    function stopWave() {
      cancelAnimationFrame(waveFrame);
      hud.style.setProperty("--level", "0");
    }

    async function typePartial() {
      partial.textContent = "“";
      for (const word of raw.split(" ")) {
        partial.textContent = partial.textContent.replace(/”?$/, "") + word + " ";
        await sleep(68);
      }
      partial.textContent = partial.textContent.trim() + "”";
    }

    async function typeLines(element, lines) {
      element.innerHTML = "";
      for (let i = 0; i < lines.length; i++) {
        if (i > 0) element.appendChild(document.createElement("br"));
        if (lines[i] === "") continue;
        for (const word of lines[i].split(" ")) {
          const token = document.createElement("span");
          token.className = "tok";
          token.textContent = word + " ";
          element.appendChild(token);
          requestAnimationFrame(() => token.classList.add("in"));
          await sleep(24);
        }
      }
    }

    async function cycle() {
      reset();
      await sleep(650);
      source.classList.add("is-listening");
      keycap.textContent = "Fn ●";
      caption.textContent = "Listening...";
      setHud("recording", "Recording", "Plain Dictation");
      startWave();
      await typePartial();
      await sleep(260);
      stopWave();
      source.classList.remove("is-listening");
      source.classList.add("is-routing");
      keycap.textContent = "Fn hold";
      caption.textContent = "Applying local edits...";
      setHud("busy", "Transcribing locally", "On-device speech");
      await sleep(660);
      setHud("busy", "Applying edits", "Plain Dictation");
      await sleep(680);
      for (const [cardSelector, outputSelector, lines] of cards) {
        document.querySelector(cardSelector).classList.add("is-on");
        await sleep(160);
        await typeLines(document.querySelector(outputSelector), lines);
        await sleep(140);
      }
      source.classList.add("is-done");
      setHud("done", "Inserted", "Plain Dictation");
      caption.textContent = "Inserted at the cursor";
      await sleep(2600);
    }

    async function run() {
      while (true) await cycle();
    }

    run();
  </script>
</body>
</html>
